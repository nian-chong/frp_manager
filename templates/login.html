<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>FRP Manager - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
    }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-area">
        <span class="logo-icon">🔐</span>
        <h2 class="logo-title">FRP Manager</h2>
        <p class="logo-subtitle">请输入管理员凭证以继续</p>
    </div>
    {% if error_msg %}
    <div class="error-msg">{{ error_msg }}</div>
    {% endif %}
    <form method="post" action="/login">
        <div class="form-group">
            <label>用户名</label>
            <input name="u" type="text" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input name="p" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登录</button>
    </form>
</div>
</body>
</html>
